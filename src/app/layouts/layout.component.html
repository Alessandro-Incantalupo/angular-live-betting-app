<header class="app-header">
  <h1>Betting Hiring Application</h1>
</header>

<div class="app-body">
  <aside class="sidebar">
    <h3>Filters</h3>

    <div class="filter-section">
      <ul>
        <li>
          <button
            [class.active]="store.selectedSport() === null"
            (click)="onSportSelect(null)"
          >
            Overview
          </button>
        </li>
        @for (sport of store.availableSports(); track sport) {
          <li>
            <button
              [class.active]="store.selectedSport() === sport"
              (click)="onSportSelect(sport)"
            >
              {{ sport }}
            </button>
            
            @if (store.selectedSport() === sport && store.availableCategories().length > 0) {
              <ul class="submenu">
                @for (category of store.availableCategories(); track category) {
                  <li>
                    <button
                      [class.active]="store.selectedCategory() === category"
                      (click)="onCategorySelect(category)"
                    >
                      {{ category }}
                    </button>
                  </li>
                }
              </ul>
            }
          </li>
        }
      </ul>
    </div>
  </aside>

  <main class="app-content">
    <router-outlet />
  </main>
</div>
